<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuickNote</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --card: #1a1a24;
      --accent: #f5c842;
      --accent2: #e07b39;
      --text: #f0eee8;
      --muted: #7a7a8c;
      --border: #2e2e3e;
      --note-bg: #1f1f2e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }

    /* Ambient background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: var(--accent);
      top: -100px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: var(--accent2);
      bottom: -100px; right: -100px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      margin-bottom: 40px;
      animation: fadeDown 0.6s ease both;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -1px;
    }

    header p {
      color: var(--muted);
      margin-top: 6px;
      font-size: 0.95rem;
    }

    .write-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 32px;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      resize: none;
      line-height: 1.7;
      min-height: 100px;
    }

    textarea::placeholder { color: var(--muted); }

    .write-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    #charCount { color: var(--muted); font-size: 0.85rem; }

    .btn-save {
      background: var(--accent);
      color: #0f0f13;
      border: none;
      padding: 10px 28px;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(245,200,66,0.3);
    }
    .btn-save:active { transform: scale(0.97); }

    .btn-save.loading {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent);
      color: #0f0f13;
      padding: 10px 24px;
      border-radius: 50px;
      font-weight: 500;
      font-size: 0.9rem;
      transition: transform 0.3s ease;
      z-index: 999;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* Notes section */
    .notes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      animation: fadeUp 0.6s ease 0.2s both;
    }

    .notes-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--text);
    }

    #noteCount {
      background: var(--border);
      color: var(--muted);
      padding: 3px 12px;
      border-radius: 50px;
      font-size: 0.8rem;
    }

    #notesList { display: flex; flex-direction: column; gap: 12px; }

    .note-card {
      background: var(--note-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      animation: fadeUp 0.4s ease both;
      transition: border-color 0.2s;
    }
    .note-card:hover { border-color: var(--accent); }

    .note-content {
      flex: 1;
      line-height: 1.6;
      font-size: 0.97rem;
      white-space: pre-wrap;
    }

    .note-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }

    .note-time {
      color: var(--muted);
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .btn-delete {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 30px; height: 30px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .btn-delete:hover {
      background: #ff4d4d22;
      color: #ff4d4d;
      border-color: #ff4d4d44;
    }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.95rem; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>QuickNote ✏️</h1>
    <p>Write it down before it slips away.</p>
  </header>

  <div class="write-box">
    <textarea id="noteInput" placeholder="What's on your mind?" maxlength="500"></textarea>
    <div class="write-footer">
      <span id="charCount">0 / 500</span>
      <button class="btn-save" onclick="saveNote()">Save Note</button>
    </div>
  </div>

  <div class="notes-header">
    <h2>Saved Notes</h2>
    <span id="noteCount">0 notes</span>
  </div>

  <div id="notesList"></div>
</div>

<div id="toast">✅ Note saved!</div>

<script>
  const API = 'http://localhost:5000/api/notes';

  const textarea = document.getElementById('noteInput');
  const charCount = document.getElementById('charCount');

  textarea.addEventListener('input', () => {
    charCount.textContent = `${textarea.value.length} / 500`;
  });

  async function loadNotes() {
    try {
      const res = await fetch(API);
      const notes = await res.json();
      renderNotes(notes);
    } catch {
      document.getElementById('notesList').innerHTML =
        '<div class="empty-state"><div class="icon">⚠️</div><p>Could not connect to server.<br>Make sure app.py is running.</p></div>';
    }
  }

  function renderNotes(notes) {
    const list = document.getElementById('notesList');
    const count = document.getElementById('noteCount');
    count.textContent = `${notes.length} note${notes.length !== 1 ? 's' : ''}`;

    if (notes.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>No notes yet. Write something above!</p></div>';
      return;
    }

    list.innerHTML = notes.map(note => `
      <div class="note-card" id="note-${note.id}">
        <div class="note-content">${escapeHtml(note.content)}</div>
        <div class="note-meta">
          <span class="note-time">${note.created_at}</span>
          <button class="btn-delete" onclick="deleteNote(${note.id})" title="Delete">🗑</button>
        </div>
      </div>
    `).join('');
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function saveNote() {
    const content = textarea.value.trim();
    if (!content) { showToast('⚠️ Write something first!'); return; }

    const btn = document.querySelector('.btn-save');
    btn.textContent = 'Saving...';
    btn.classList.add('loading');

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content })
      });
      if (res.ok) {
        textarea.value = '';
        charCount.textContent = '0 / 500';
        showToast('✅ Note saved!');
        loadNotes();
      }
    } catch {
      showToast('❌ Failed to save. Is server running?');
    }

    btn.textContent = 'Save Note';
    btn.classList.remove('loading');
  }

  async function deleteNote(id) {
    await fetch(`${API}/${id}`, { method: 'DELETE' });
    loadNotes();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Allow Ctrl+Enter to save
  textarea.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') saveNote();
  });

  loadNotes();
</script>
</body>
</html>
